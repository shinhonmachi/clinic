<style>
    
              
        
  /* Main Visual */
  .hero-photo {
    width: 100%;
    height: 420px;
    object-fit: cover;
    object-position: center;
    display: block;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .hero-photo:hover { opacity: 0.95; }

  .container { max-width: 800px; margin: 0 auto; padding: 48px 32px; }

  /* Section Title */
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 20px;
    background: var(--sakura-deep);
    border-radius: 2px;
  }

  /* Photo Grid */
  .photo-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 48px;
  }
  .photo-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 48px;
  }
  .photo-item {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    background: var(--border);
    cursor: pointer;
  }
  .photo-item img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .photo-grid-2 .photo-item img { height: 340px; }
  .photo-item:hover img { transform: scale(1.04); }
  .photo-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(58,53,48,0.7) 0%, transparent 100%);
    color: white;
    font-size: 12px;
    padding: 28px 14px 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .photo-item:hover .photo-caption { opacity: 1; }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,25,22,0.92);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 24px;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .lightbox-caption { color: rgba(255,255,255,0.7); font-size: 13px; }
  .lightbox-close {
    position: absolute;
    top: 20px; right: 24px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 32px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
    padding: 12px;
  }
  .lightbox-nav:hover { opacity: 1; }
  .lightbox-prev { left: 12px; }
  .lightbox-next { right: 12px; }

    
  @media (max-width: 600px) {
    .photo-grid-3 { grid-template-columns: 1fr 1fr; }
    .hero-photo { height: 260px; }
  }
</style>

<body>

<div class="page-hero">

</div>

<!-- Exterior Main Visual -->

  <img src="../pics/gaikan.JPG" class="hero-photo" alt="诊所外观" onclick="openLightbox(0)" loading="eager" decoding="async" width="1440" height="1080">
</picture>

      <source srcset="../pics/shisetsu_uketsuke.webp" type="image/webp">
      <img src="../pics/shisetsu_uketsuke.webp" alt="前台・候诊区 desk" loading="lazy" decoding="async" width="1200" height="1600">
    </picture>

    </div>
  </div>

  <!-- 诊疗室 -->

    </picture>
      <div class="photo-caption">诊察台</div>
    </div>
    <div class="photo-item" onclick="openLightbox(4)">
      <picture>
      <source srcset="../pics/sinsatsu2.webp" type="image/webp">
      <img src="../pics/sinsatsu2.JPG" alt="诊察台2" loading="lazy" decoding="async" width="1000" height="1333">
    </picture>

    </div>
    <div class="photo-item" onclick="openLightbox(5)">

      <source srcset="../pics/sinsatsu4.jpeg" type="image/webp">
      <img src="../pics/sinsatsu4.jpeg" alt="诊察台4" loading="lazy" decoding="async" width="1000" height="1333">

    <div class="photo-item" onclick="openLightbox(7)">

    </picture>

    </div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightboxBtn()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">‹</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">›</button>
</div>

<div id="footer-placeholder"></div>

<script>
  const photos = [
    { src: 'pics/gaikan.webp', caption: '诊所外观' },
    { src: 'pics/shisetsu_uketsuke.webp', caption: '前台・候诊区 Counter' },
    { src: 'pics/shisetsu_machiai.webp', caption: '候诊区' },
    { src: 'pics/sinsatsu1.webp', caption: '诊察台' },
    { src: 'pics/sinsatsu2.webp', caption: '诊察台' },
    { src: 'pics/sinsatsu4.jpeg', caption: '诊察台' },
    { src: 'pics/shisetsu_kigu1.webp', caption: '臭氧发生器' },
        { src: 'pics/shisetsu_kigu2.webp', caption: '超级激光' }
  ];
  let current = 0;

  function openLightbox(index) {
    current = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightboxBtn() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeLightbox(e) {
    if (e.target === document.getElementById('lightbox')) closeLightboxBtn();
  }
  function navLightbox(dir) {
    current = (current + dir + photos.length) % photos.length;
    updateLightbox();
  }
  function updateLightbox() {
    document.getElementById('lightbox-img').src = photos[current].src;
    document.getElementById('lightbox-caption').textContent = photos[current].caption;
  }
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
    if (e.key === 'Escape') closeLightboxBtn();
  });
</script>

<script src="common_cn.js"></script>
