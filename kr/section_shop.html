<style>
  .container { max-width: 800px; margin: 0 auto; padding: 48px 32px; }

  /* Section Heading */
  .section-heading {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px; font-weight: 600;
    margin: 48px 0 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .section-heading:first-of-type { margin-top: 0; }
  .section-heading::before {
    content: ''; display: inline-block;
    width: 4px; height: 20px;
    background: var(--sakura-deep); border-radius: 2px; flex-shrink: 0;
  }

  /* Product Grid */
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
    margin-bottom: 8px;
  }

  /* Product Card */
  .shop-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    transition: all 0.25s;
    display: flex; flex-direction: column;
  }
  .shop-card:hover {
    box-shadow: 0 6px 24px rgba(232,145,142,0.13);
    transform: translateY(-3px);
  }

  /* Photo */
  .card-img {
    width: 100%; aspect-ratio: 4/3;
    object-fit: cover; display: block;
    background: var(--sakura-light);
    transition: transform 0.4s ease;
  }
  .shop-card:hover .card-img { transform: scale(1.04); }

  /* No-Photo Placeholder */
  .card-img-placeholder {
    width: 100%; aspect-ratio: 4/3;
    background: var(--sakura-light);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: var(--sakura-deep); opacity: 0.45;
  }
  .card-img-placeholder svg { width: 32px; height: 32px; }
  .card-img-placeholder span { font-size: 11px; }

  /* Text Area */
  .card-body { padding: 16px 18px 20px; flex: 1; display: flex; flex-direction: column; }
  .card-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.7; flex: 1; margin-bottom: 14px; }
  .card-price {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px; font-weight: 600; color: var(--sakura-deep);
  }
  .card-price.inquiry { font-size: 13px; font-weight: 500; font-family: 'Noto Sans JP', sans-serif; }

  /* Note */
  .info-box {
    background: var(--green-light); border: 1px solid #c5dece;
    border-radius: 12px; padding: 18px 22px; margin-top: 48px;
  }
  .info-box-title { font-size: 14px; font-weight: 500; color: var(--green); margin-bottom: 8px; }
  .info-box ul { padding-left: 16px; }
  .info-box li { font-size: 13px; color: var(--text-muted); line-height: 1.9; }

  @media (max-width: 540px) {
    .container { padding: 32px 16px; }
    .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-body { padding: 12px 14px 16px; }
  }
</style>
</head>
<body>

<div id="header-placeholder"></div>


<div class="page-hero">
  <span class="page-label">원내 샵</span>
  <div class="page-title">원내 샵</div>
  <div class="page-sub">미용, 예방, 체질 개선을 위한 상품</div>
</div>

<div class="container">

  <!--
    =====================================================
    상품 추가 및 수정 방법

    [사진 있는 경우]
    <div class="shop-card">
      <img class="card-img" src="../pics/product.webp" alt="상품명" loading="lazy">
      <div class="card-body">
        <div class="card-name">상품명</div>
        <div class="card-desc">상품 설명</div>
        <div class="card-price">¥0,000</div>
      </div>
    </div>

    [사진 없는 경우] → card-img-placeholder 블록을 그대로 사용

    [가격 문의] → 클래스를 "card-price inquiry"로 변경
    =====================================================
  -->

  <!-- Supplements -->
  <div class="section-heading">건강보조식품</div>
  <div class="shop-grid">

    <div class="shop-card">
      <img class="card-img" src="../pics/shop_collagen.webp" alt="상품 이미지" loading="lazy">
      <div class="card-body">

        <div class="card-desc">1박스 30봉입</div>
        <div class="card-price"></div>
      </div>
    </div>

    <div class="shop-card">
     <img class="card-img" src="../pics/shop_ginseng.webp" alt="상품 이미지" loading="lazy">
      <div class="card-body">
        <div class="card-name">고려인삼 사포닌 캡슐</div>
        <div class="card-desc">1봉 90캡슐</div>
        <div class="card-price"></div>
      </div>
    </div>

    <div class="shop-card">
     <img class="card-img" src="../pics/shop_CplusD.webp" alt="상품 이미지" loading="lazy">
      <div class="card-body">
        <div class="card-name">리포캡슐 비타민C+D</div>
        <div class="card-desc">1박스 30봉입</div>
