  <img id="lightbox-img" src="" alt="">

<script>
  const photos = [
    { src: 'pics/gaikan.webp', caption: 'Clinic Exterior' },
    { src: 'pics/shisetsu_uketsuke.webp', caption: 'Reception Counter' },
    { src: 'pics/shisetsu_machiai.webp', caption: 'Waiting Area' },
    { src: 'pics/sinsatsu1.webp', caption: 'Examination Table' },
    { src: 'pics/sinsatsu2.webp', caption: 'Examination Table' },
    { src: 'pics/sinsatsu4.jpeg', caption: 'Examination Table' },
    { src: 'pics/shisetsu_kigu1.webp', caption: 'Ozone Generator' },
        { src: 'pics/shisetsu_kigu2.webp', caption: 'Super Lizer' }
  ];
  let current = 0;

  function openLightbox(index) {
    current = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightboxBtn() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeLightbox(e) {
    if (e.target === document.getElementById('lightbox')) closeLightboxBtn();
  }
  function navLightbox(dir) {
    current = (current + dir + photos.length) % photos.length;
    updateLightbox();
  }
  function updateLightbox() {
    document.getElementById('lightbox-img').src = photos[current].src;
    document.getElementById('lightbox-caption').textContent = photos[current].caption;
  }
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
    if (e.key === 'Escape') closeLightboxBtn();
  });
</script>
