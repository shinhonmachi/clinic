<style>
/* ===== Hero Slider ===== */
.hero-slider {
  position: relative;
  width: 100%;
  height: 460px;
  overflow: hidden;
  background: #2a1f1c;
}
.hero-slider-track {
  display: flex;
  height: 100%;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.hero-slide {
  min-width: 100%;
  height: 100%;
  position: relative;
  flex-shrink: 0;
}
.hero-slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}
.hero-slide-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(30,20,18,0.62) 0%,
    rgba(30,20,18,0.28) 55%,
    rgba(30,20,18,0.10) 100%
  );
}
.hero-caption {
  position: absolute;
  top: 50%;
  left: 60px;
  transform: translateY(-50%);
  z-index: 2;
  max-width: 400px;
}
.hero-tag {
  display: inline-block;
  background: rgba(247,197,197,0.22);
  border: 1px solid rgba(247,197,197,0.5);
  color: #f9d8d8;
  font-size: 11px;
  padding: 4px 16px;
  border-radius: 20px;
  margin-bottom: 18px;
  letter-spacing: 0.12em;
  backdrop-filter: blur(4px);
}
.hero-caption h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: 34px;
  font-weight: 600;
  line-height: 1.6;
  color: #fff;
  text-shadow: 0 2px 16px rgba(0,0,0,0.3);
  margin-bottom: 16px;
}
.hero-caption p {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
  line-height: 2;
  margin-bottom: 28px;
}
.hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
.btn-primary { background: var(--sakura-deep); color: white; border: none; padding: 12px 28px; border-radius: 30px; font-size: 14px; cursor: pointer; font-family: inherit; transition: all 0.2s; font-weight: 500; text-decoration: none; display: inline-block; }
.btn-primary:hover { background: #d97a77; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,145,142,0.4); }
.btn-outline { background: rgba(255,255,255,0.12); color: white; border: 1.5px solid rgba(255,255,255,0.55); padding: 12px 28px; border-radius: 30px; font-size: 14px; cursor: pointer; font-family: inherit; transition: all 0.2s; font-weight: 500; text-decoration: none; display: inline-block; backdrop-filter: blur(4px); }
.btn-outline:hover { background: rgba(255,255,255,0.22); transform: translateY(-1px); }

/* Slider Controls */
.slider-prev, .slider-next {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  z-index: 10;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.4);
  color: white;
  width: 44px; height: 44px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.slider-prev { left: 16px; }
.slider-next { right: 16px; }
.slider-prev:hover, .slider-next:hover { background: rgba(255,255,255,0.32); }

/* Dots */
.slider-dots {
  position: absolute;
  bottom: 16px;
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px;
  z-index: 10;
}
.slider-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  border: none; cursor: pointer;
  padding: 0;
  transition: background 0.3s, transform 0.3s;
}
.slider-dot.active {
  background: white;
  transform: scale(1.3);
}

@media (max-width: 600px) {
  .hero-slider { height: 280px; }
  .hero-caption { left: 24px; right: 24px; max-width: none; }
  .hero-caption h1 { font-size: 22px; }
  .hero-caption p { display: none; }
  .slider-prev, .slider-next { width: 34px; height: 34px; font-size: 14px; }
}

/* ===== Common Section Styles ===== */
section { padding: 56px 32px; }
.section-header { text-align: center; margin-bottom: 36px; }
.section-label { display: inline-block; font-size: 11px; color: #c0514d; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 10px; }
.section-title { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 600; color: var(--text); }
.section-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; line-height: 1.8; }

/* ===== Departments ===== */
.departments { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; max-width: 660px; margin: 0 auto 28px; }
.dept-card { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 28px 20px 22px; text-align: center; transition: all 0.25s; text-decoration: none; display: block; }
.dept-card:hover { border-color: var(--sakura); box-shadow: 0 6px 24px rgba(232,145,142,0.14); transform: translateY(-3px); }
.dept-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 24px; }
.dept-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 8px; font-family: 'Noto Serif JP', serif; }
.dept-desc { font-size: 12px; color: var(--text-muted); line-height: 1.7; margin-bottom: 12px; }
.dept-symptoms { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
.dept-symptom { font-size: 10px; background: var(--sakura-light); color: #c0514d; border-radius: 10px; padding: 2px 9px; }
.dept-symptom.green { background: var(--green-light); color: var(--green); }
.dept-cta { text-align: center; }
.dept-cta a { font-size: 13px; color: #c0514d; text-decoration: none; border-bottom: 1px solid var(--sakura); padding-bottom: 1px; }
.dept-cta a:hover { opacity: 0.7; }

/* ===== First-Time Visitors ===== */
.first-visit-section { background: linear-gradient(135deg, #fdf6f6 0%, #f0f7f2 100%); }
.first-visit-inner { max-width: 640px; margin: 0 auto; }
.steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
.step { position: relative; text-align: center; padding: 20px 12px; }
.step::after { content: '›'; position: absolute; right: -4px; top: 38px; font-size: 18px; color: var(--sakura); line-height: 1; }
.step:last-child::after { display: none; }
.step-num { width: 36px; height: 36px; background: var(--sakura-deep); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; margin: 0 auto 10px; }
.step-icon { font-size: 22px; margin-bottom: 6px; }
.step-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.step-desc { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
.first-visit-note { margin-top: 24px; background: white; border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; display: flex; align-items: flex-start; gap: 12px; font-size: 13px; color: var(--text-muted); line-height: 1.85; }
.first-visit-note .note-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

/* ===== Self-Pay Services ===== */
.selfpay-section { background: white; }
.selfpay-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; max-width: 660px; margin: 0 auto 24px; }
.selfpay-card { border: 1px solid var(--border); border-radius: 16px; padding: 20px 14px 16px; text-align: center; transition: all 0.2s; background: var(--cream); }
.selfpay-card:hover { border-color: var(--sakura); box-shadow: 0 4px 16px rgba(232,145,142,0.1); transform: translateY(-2px); }
.selfpay-icon { font-size: 26px; margin-bottom: 10px; }
.selfpay-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.selfpay-desc { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
.selfpay-cta { text-align: center; }
.selfpay-cta a { display: inline-block; font-size: 13px; color: #c0514d; text-decoration: none; border: 1px solid var(--sakura); padding: 8px 24px; border-radius: 20px; transition: all 0.2s; }
.selfpay-cta a:hover { background: var(--sakura-light); }

/* ===== News ===== */
.news-section { background: var(--cream); }
.news-list { max-width: 580px; margin: 0 auto 20px; }
.news-item { display: flex; align-items: flex-start; gap: 14px; padding: 15px 0; border-bottom: 1px solid var(--border); }
.news-item:last-child { border-bottom: none; }
.news-date { font-size: 12px; color: var(--text-muted); min-width: 80px; padding-top: 2px; }
.news-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; min-width: 54px; text-align: center; font-weight: 500; flex-shrink: 0; }
.badge-info { background: #e8f4fd; color: #3b85c0; }
.badge-new { background: var(--sakura-light); color: #c0514d; }
.badge-holiday { background: var(--green-light); color: var(--green); }
.news-text { font-size: 13px; color: var(--text); flex: 1; line-height: 1.7; }
.news-more { text-align: center; }
.news-more a { font-size: 13px; color: #c0514d; text-decoration: none; border-bottom: 1px solid var(--sakura); padding-bottom: 1px; }

/* ===== Director's Message ===== */
.doctor-section { background: white; }
.doctor-inner { max-width: 600px; margin: 0 auto; background: linear-gradient(135deg, #fdf6f6 0%, #f0f7f2 100%); border: 1px solid var(--border); border-radius: 24px; padding: 32px; display: flex; gap: 28px; align-items: flex-start; }
.doctor-avatar { width: 88px; height: 88px; border-radius: 50%; background: var(--sakura-light); border: 3px solid var(--sakura); display: flex; align-items: center; justify-content: center; font-size: 36px; flex-shrink: 0; }
.doctor-role { font-size: 11px; color: #c0514d; letter-spacing: 0.1em; margin-bottom: 4px; }
.doctor-name { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
.doctor-msg { font-size: 13px; color: var(--text-muted); line-height: 2; margin-bottom: 16px; }
.doctor-link a { font-size: 13px; color: #c0514d; text-decoration: none; border-bottom: 1px solid var(--sakura); padding-bottom: 1px; }

/* ===== Office Hours ===== */
.hours-section { background: var(--sakura-light); }
.hours-card { background: white; border-radius: 20px; padding: 28px; max-width: 560px; margin: 0 auto; border: 1px solid var(--border); }
.hours-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.hours-table th { text-align: center; padding: 8px 6px; font-size: 12px; color: var(--text); font-weight: 600; border-bottom: 1px solid var(--border); }
.hours-table td { text-align: center; padding: 10px 6px; border-bottom: 1px dashed var(--border); }
.hours-table tr:last-child td { border-bottom: none; }
.hours-table td:first-child { text-align: left; font-weight: 500; padding-left: 0; color: var(--text); }
.check { color: #c0514d; font-size: 16px; }
.dash  { color: #a89890; }
.note  { display: flex; align-items: center; gap: 6px; margin-top: 16px; font-size: 12px; color: #5a504a; background: var(--green-light); padding: 10px 14px; border-radius: 10px; }

/* ===== Access ===== */
.access-section { background: white; }
.access-inner { max-width: 560px; margin: 0 auto; display: grid; gap: 14px; }
.access-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.access-card { background: var(--cream); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; display: flex; align-items: flex-start; gap: 14px; }
.access-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 17px; }
.access-icon.pink  { background: var(--sakura-light); }
.access-icon.green { background: var(--green-light); }
.access-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
.access-value { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.6; }
.access-value a { color: #c0514d; text-decoration: none; }
.map-embed { border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
.map-embed iframe { display: block; width: 100%; height: 220px; border: none; }

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .hero h1 { font-size: 26px; }
  .hero-content { padding: 56px 24px 48px; }
  section { padding: 44px 20px; }
  .steps { grid-template-columns: 1fr 1fr; }
  .step::after { display: none; }
  .access-cards { grid-template-columns: 1fr; }
  .doctor-inner { flex-direction: column; align-items: center; text-align: center; }
}

<script>
/* Show only the latest 3 news items; show "View All" link if there are more */
(function () {
  const MAX = 3;
  const target = document.getElementById('news-placeholder');
  if (!target) return;
  new MutationObserver(function () {
    const items = target.querySelectorAll('.news-item');
    if (items.length > MAX) {
      for (let i = MAX; i < items.length; i++) items[i].style.display = 'none';
      const more = document.getElementById('news-more');
      if (more) more.style.display = 'block';
    }
  }).observe(target, { childList: true });
})();

/* Hero Slider */
(function () {
  const track  = document.getElementById('heroTrack');
  const slides = track ? track.querySelectorAll('.hero-slide') : [];
  const dotsEl = document.getElementById('sliderDots');
  if (!slides.length) return;

  let current = 0;
  let timer;

  // Generate dots
  slides.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'slider-dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Slide ' + (i + 1));
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  });

  function goTo(n) {
    current = (n + slides.length) % slides.length;
    track.style.transform = `translateX(-${current * 100}%)`;
    dotsEl.querySelectorAll('.slider-dot').forEach((d, i) =>
      d.classList.toggle('active', i === current)
    );
  }

  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  function startAuto() { timer = setInterval(next, 4500); }
  function resetAuto() { clearInterval(timer); startAuto(); }

  document.getElementById('sliderNext').addEventListener('click', () => { next(); resetAuto(); });
  document.getElementById('sliderPrev').addEventListener('click', () => { prev(); resetAuto(); });

  // Touch swipe
  let startX = 0;
  track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  track.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) { dx < 0 ? next() : prev(); resetAuto(); }
  });

  startAuto();
})();
</script>
</body>
</html>
