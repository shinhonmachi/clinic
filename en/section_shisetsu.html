<style>
    
              
        
  /* Main Visual */
  .hero-photo {
    width: 100%;
    height: 420px;
    object-fit: cover;
    object-position: center;
    display: block;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .hero-photo:hover { opacity: 0.95; }

  .container { max-width: 800px; margin: 0 auto; padding: 48px 32px; }

  /* Section Title */
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 20px;
    background: var(--sakura-deep);
    border-radius: 2px;
  }

  /* Photo Grid */
  .photo-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 48px;
  }
  .photo-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 48px;
  }
  .photo-item {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    background: var(--border);
    cursor: pointer;
  }
  .photo-item img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .photo-grid-2 .photo-item img { height: 340px; }
  .photo-item:hover img { transform: scale(1.04); }
  .photo-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(58,53,48,0.7) 0%, transparent 100%);
    color: white;
    font-size: 12px;
    padding: 28px 14px 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .photo-item:hover .photo-caption { opacity: 1; }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,25,22,0.92);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 24px;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .lightbox-caption { color: rgba(255,255,255,0.7); font-size: 13px; }
  .lightbox-close {
    position: absolute;
    top: 20px; right: 24px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 32px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
    padding: 12px;
  }
  .lightbox-nav:hover { opacity: 1; }
  .lightbox-prev { left: 12px; }
  .lightbox-next { right: 12px; }

    
  @media (max-width: 600px) {
    .photo-grid-3 { grid-template-columns: 1fr 1fr; }
    .hero-photo { height: 260px; }
  }
</style>

<style>
.site-header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border,#ede8e3);box-shadow:0 1px 8px rgba(0,0,0,.05);}
.header-inner{max-width:860px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:16px;}
.site-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-mark{width:36px;height:36px;background:var(--sakura-deep,#c0514d);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;}
.logo-name{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--text,#2a2220);line-height:1.2;}
.logo-sub{font-size:9px;color:#8a7a72;line-height:1.3;letter-spacing:.01em;}
.header-nav{display:flex;align-items:center;gap:2px;margin-left:auto;}
.nav-link{font-size:12px;color:var(--text,#2a2220);text-decoration:none;padding:6px 9px;border-radius:8px;transition:all .18s;white-space:nowrap;font-weight:400;}
.nav-link:hover{background:var(--sakura-light,#fdf0ef);color:var(--sakura-deep,#c0514d);}
.nav-link.lang-switch{border:1px solid var(--border,#ede8e3);margin-left:4px;font-size:11px;}
.header-actions{display:none;align-items:center;gap:10px;flex-shrink:0;}
.header-tel{font-size:13px;font-weight:600;color:var(--sakura-deep,#c0514d);text-decoration:none;font-family:'Noto Serif JP',serif;}
.btn-lang{font-size:11px;color:var(--text,#2a2220);text-decoration:none;border:1px solid var(--border,#ede8e3);padding:4px 8px;border-radius:8px;white-space:nowrap;}
.hamburger{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--text,#2a2220);border-radius:2px;transition:all .25s;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.mobile-nav{display:none;flex-direction:column;background:white;border-top:1px solid var(--border,#ede8e3);padding:8px 0 16px;}
.mobile-nav.open{display:flex;}
.mobile-nav-link{font-size:14px;color:var(--text,#2a2220);text-decoration:none;padding:12px 24px;transition:background .15s;}
.mobile-nav-link:hover{background:var(--cream,#faf7f4);}
.mobile-nav-divider{height:1px;background:var(--border,#ede8e3);margin:8px 24px;}
.lang-link{color:#8a7a72;font-size:13px;}
@media(max-width:700px){.header-nav{display:none;}.header-actions{display:flex;}}
@media(min-width:701px){.mobile-nav{display:none!important;}}
</style>
