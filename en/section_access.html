                            .container { max-width: 680px; margin: 0 auto; padding: 48px 32px; }

  /* Section Heading */
  .section-heading {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-heading::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 20px;
    background: var(--sakura-deep);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .section-gap { margin-bottom: 48px; }

  /* Office Hours */
  .hours-card { background: white; border-radius: 20px; padding: 32px; border: 1px solid var(--border); margin-bottom: 16px; }
  .hours-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .hours-table th { text-align: center; padding: 10px 6px; font-size: 12px; color: var(--text); font-weight: 600; border-bottom: 2px solid var(--border); }
  .hours-table td { text-align: center; padding: 12px 6px; border-bottom: 1px dashed var(--border); }
  .hours-table tr:last-child td { border-bottom: none; }
  .hours-table td:first-child { text-align: left; font-weight: 500; padding-left: 0; }
  .check { color: #c0514d; font-size: 18px; }
  .dash { color: #a89890; }
  .note-list { display: grid; gap: 12px; margin-bottom: 16px; }
  .note-item { display: flex; align-items: flex-start; gap: 12px; background: white; border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .note-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .note-text { font-size: 13px; color: var(--text); }
  .note-text strong { font-weight: 500; display: block; margin-bottom: 2px; }
  .tel-card { background: var(--sakura-light); border: 1px solid var(--sakura); border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 16px; }
  .tel-label { font-size: 12px; color: #5a504a; margin-bottom: 8px; }
  .tel-number { font-family: 'Noto Serif JP', serif; font-size: 24px; color: #c0514d; font-weight: 600; }
  .tel-hours { font-size: 12px; color: #5a504a; margin-top: 6px; }

  /* Access */
  .info-grid { display: grid; gap: 14px; margin-bottom: 16px; }
  .info-row { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; display: flex; align-items: flex-start; gap: 16px; }
  .info-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .info-label { font-size: 11px; color: #5a504a; margin-bottom: 4px; }
  .info-value { font-size: 14px; font-weight: 500; color: var(--text); }
  .info-note { font-size: 12px; color: #5a504a; margin-top: 4px; }
  .route-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 14px; }
  .route-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .route-steps { display: flex; flex-direction: column; gap: 10px; padding-left: 12px; border-left: 2px dashed var(--sakura); }
  .route-step { font-size: 13px; color: #5a504a; position: relative; padding-left: 16px; }
  .route-step::before { content: ''; position: absolute; left: -18px; top: 8px; width: 8px; height: 8px; background: var(--sakura-deep); border-radius: 50%; }
  .route-step strong { color: var(--text); font-weight: 500; }

<style>
.site-header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border,#ede8e3);box-shadow:0 1px 8px rgba(0,0,0,.05);}
.header-inner{max-width:860px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:16px;}
.site-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-mark{width:36px;height:36px;background:var(--sakura-deep,#c0514d);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;}
.logo-name{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--text,#2a2220);line-height:1.2;}
.logo-sub{font-size:9px;color:#8a7a72;line-height:1.3;letter-spacing:.01em;}
.header-nav{display:flex;align-items:center;gap:2px;margin-left:auto;}
.nav-link{font-size:12px;color:var(--text,#2a2220);text-decoration:none;padding:6px 9px;border-radius:8px;transition:all .18s;white-space:nowrap;font-weight:400;}
.nav-link:hover{background:var(--sakura-light,#fdf0ef);color:var(--sakura-deep,#c0514d);}
.nav-link.lang-switch{border:1px solid var(--border,#ede8e3);margin-left:4px;font-size:11px;}
.header-actions{display:none;align-items:center;gap:10px;flex-shrink:0;}
.header-tel{font-size:13px;font-weight:600;color:var(--sakura-deep,#c0514d);text-decoration:none;font-family:'Noto Serif JP',serif;}
.btn-lang{font-size:11px;color:var(--text,#2a2220);text-decoration:none;border:1px solid var(--border,#ede8e3);padding:4px 8px;border-radius:8px;white-space:nowrap;}
.hamburger{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--text,#2a2220);border-radius:2px;transition:all .25s;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.mobile-nav{display:none;flex-direction:column;background:white;border-top:1px solid var(--border,#ede8e3);padding:8px 0 16px;}
.mobile-nav.open{display:flex;}
.mobile-nav-link{font-size:14px;color:var(--text,#2a2220);text-decoration:none;padding:12px 24px;transition:background .15s;}
.mobile-nav-link:hover{background:var(--cream,#faf7f4);}
.mobile-nav-divider{height:1px;background:var(--border,#ede8e3);margin:8px 24px;}
.lang-link{color:#8a7a72;font-size:13px;}
@media(max-width:700px){.header-nav{display:none;}.header-actions{display:flex;}}
@media(min-width:701px){.mobile-nav{display:none!important;}}
</style>
