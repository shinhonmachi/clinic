<style>
                  
        
  .container { max-width: 720px; margin: 0 auto; padding: 48px 32px; }

  /* Insurance/Card Section */
  .insurance-banner { display: flex; align-items: center; gap: 14px; background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 36px; border-left: 4px solid var(--sakura-deep); }
  .insurance-icon { font-size: 28px; flex-shrink: 0; }
  .insurance-text { font-size: 13px; color: var(--text); line-height: 1.8; }
  .insurance-text strong { font-size: 15px; font-family: 'Noto Serif JP', serif; display: block; margin-bottom: 4px; }

  /* Fee Section */
  .fee-section { margin-bottom: 36px; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .section-icon { font-size: 22px; }
  .section-title { font-family: 'Noto Serif JP', serif; font-size: 17px; font-weight: 600; }
  .fee-table-wrap { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .fee-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .fee-table thead tr { background: var(--sakura-light); }
  .fee-table th { padding: 12px 18px; text-align: left; font-size: 12px; font-weight: 500; color: var(--sakura-deep); }
  .fee-table th:last-child { text-align: right; }
  .fee-table td { padding: 13px 18px; border-top: 1px dashed var(--border); color: var(--text); }
  .fee-table td:last-child { text-align: right; font-weight: 500; color: var(--sakura-deep); white-space: nowrap; }
  .fee-table tr:hover td { background: #fdfaf8; }
  .fee-note { font-size: 11px; color: var(--text-muted); margin-top: 8px; padding: 0 4px; }

  /* Self-Pay Services */
  .self-pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .self-pay-card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; }
  .self-pay-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .self-pay-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.6; }
  .self-pay-price { font-family: 'Noto Serif JP', serif; font-size: 18px; color: var(--sakura-deep); font-weight: 600; }
  .self-pay-price small { font-size: 11px; font-weight: 400; color: var(--text-muted); font-family: 'Noto Sans JP', sans-serif; }

  /* Payment Methods */
  .payment-list { display: flex; flex-wrap: wrap; gap: 10px; }
  .payment-tag { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 8px 16px; font-size: 13px; display: flex; align-items: center; gap: 6px; }

  /* Important Notes */
  .info-box { background: var(--green-light); border: 1px solid #c5dece; border-radius: 12px; padding: 20px 24px; margin-top: 8px; }
  .info-box-title { font-size: 14px; font-weight: 500; color: var(--green); margin-bottom: 10px; }
  .info-box ul { padding-left: 16px; }
  .info-box li { font-size: 13px; color: var(--text-muted); line-height: 1.9; }

    
  @media (max-width: 540px) {
    .container { padding: 32px 16px; }
    .self-pay-grid { grid-template-columns: 1fr; }
  }
</style>

<style>
.site-header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border,#ede8e3);box-shadow:0 1px 8px rgba(0,0,0,.05);}
.header-inner{max-width:860px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:16px;}
.site-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-mark{width:36px;height:36px;background:var(--sakura-deep,#c0514d);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;}

.nav-link:hover{background:var(--sakura-light,#fdf0ef);color:var(--sakura-deep,#c0514d);}
.nav-link.lang-switch{border:1px solid var(--border,#ede8e3);margin-left:4px;font-size:11px;}
.header-actions{display:none;align-items:center;gap:10px;flex-shrink:0;}
.header-tel{font-size:13px;font-weight:600;color:var(--sakura-deep,#c0514d);text-decoration:none;font-family:'Noto Serif JP',serif;}
.btn-lang{font-size:11px;color:var(--text,#2a2220);text-decoration:none;border:1px solid var(--border,#ede8e3);padding:4px 8px;border-radius:8px;white-space:nowrap;}
.hamburger{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--text,#2a2220);border-radius:2px;transition:all .25s;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.mobile-nav{display:none;flex-direction:column;background:white;border-top:1px solid var(--border,#ede8e3);padding:8px 0 16px;}
.mobile-nav.open{display:flex;}

.mobile-nav-divider{height:1px;background:var(--border,#ede8e3);margin:8px 24px;}
.lang-link{color:#8a7a72;font-size:13px;}
