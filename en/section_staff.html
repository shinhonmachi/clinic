<style>
  .outer { max-width: 760px; margin: 0 auto; padding: 56px 32px 80px; }

  /* Profile Block */
  .profile-block {
    display: flex; align-items: flex-start; gap: 32px;
    background: white; border: 1px solid var(--border);
    border-radius: 24px; padding: 36px;
    margin-bottom: 32px;
    position: relative; overflow: hidden;
  }
  .profile-block::after {
    content: ''; position: absolute; top: 0; right: 0;
    width: 140px; height: 140px;
    background: radial-gradient(circle at top right, var(--sakura-light) 0%, transparent 70%);
    pointer-events: none;
  }
  .profile-photo {
    flex-shrink: 0; width: 110px; height: 110px; border-radius: 50%;
    background: var(--sakura-light); border: 3px solid var(--sakura);
    display: flex; align-items: center; justify-content: center; font-size: 48px;
    overflow: hidden;
  }
  .profile-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .profile-info { flex: 1; }
  .profile-role { font-size: 11px; color: var(--sakura-deep); letter-spacing: 0.12em; margin-bottom: 8px; }
  .profile-name { font-family: 'Noto Serif JP', serif; font-size: 26px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
  .profile-name-en { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }
  .profile-tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .profile-tag {
    font-size: 11px; padding: 4px 12px; border-radius: 20px;
    background: var(--sakura-light); color: var(--sakura-deep); border: 1px solid var(--sakura);
  }
  .profile-tag.green { background: var(--green-light); color: var(--green); border-color: #b5d4bf; }

  /* Greeting Body */
  .greeting-wrap {
    background: white; border: 1px solid var(--border);
    border-radius: 24px; padding: 44px;
    margin-bottom: 32px;
  }
  .chapter {
    display: flex; align-items: center; gap: 12px;
    margin: 36px 0 20px;
  }
  .chapter:first-child { margin-top: 0; }
  .chapter-line { flex: 1; height: 1px; background: var(--border); }
  .chapter-label { font-size: 10px; letter-spacing: 0.2em; color: var(--sakura-deep); white-space: nowrap; text-transform: uppercase; }
  .greeting-body { margin-bottom: 0; }
  .greeting-body p {
    font-size: 14px; line-height: 2.0; color: var(--text);
    margin-bottom: 1.3em; text-align: justify;
  }
  .greeting-body p:last-child { margin-bottom: 0; }
  .highlight-quote {
    border-left: 3px solid var(--sakura-deep);
    padding: 6px 0 6px 18px; margin: 22px 0;
    font-family: 'Noto Serif JP', serif;
    font-size: 14px; line-height: 1.9; color: var(--sakura-deep);
  }

  /* Closing Card */
  .closing-card {
    background: linear-gradient(135deg, var(--sakura-light) 0%, #f0f7f2 100%);
    border: 1px solid var(--sakura); border-radius: 20px;
    padding: 40px; text-align: center;
  }
  .closing-icon { font-size: 28px; margin-bottom: 18px; }
  .closing-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px; line-height: 2.1; color: var(--text);
    margin-bottom: 16px;
  }
  .closing-from { font-size: 12px; color: var(--text-muted); }

  .profile-career {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  /* Career & Certifications Block */
  .career-wrap {
    background: white; border: 1px solid var(--border);
    border-radius: 24px; padding: 44px;
    margin-bottom: 32px;
  }
  .career-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .career-section-title {
    font-size: 11px; letter-spacing: 0.18em; color: var(--sakura-deep);
    text-transform: uppercase; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .career-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Education & Degree */
  .career-table { width: 100%; border-collapse: collapse; }
  .career-table tr { border-bottom: 1px dashed var(--border); }
  .career-table tr:last-child { border-bottom: none; }
  .career-table td { padding: 10px 0; font-size: 13px; line-height: 1.7; vertical-align: top; }
  .career-table td:first-child {
    color: var(--text-muted); font-size: 11px; min-width: 72px;
    padding-right: 12px; padding-top: 12px; white-space: nowrap;
  }
  .career-table td:last-child { color: var(--text); font-weight: 500; }

  /* Certifications List */
  .cert-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .cert-item {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px; color: var(--text); line-height: 1.7;
  }
  .cert-icon {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--green-light); color: var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; margin-top: 1px;
  }

  @media (max-width: 600px) {
    .career-grid { grid-template-columns: 1fr; gap: 28px; }
  }
  .fade-in { opacity: 0; transform: translateY(18px); animation: fadeUp 0.65s ease forwards; }
  .fade-in:nth-child(1) { animation-delay: 0.05s; }
  .fade-in:nth-child(2) { animation-delay: 0.18s; }
  .fade-in:nth-child(3) { animation-delay: 0.30s; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 560px) {
    .outer { padding: 32px 16px 60px; }
    .profile-block { flex-direction: column; align-items: center; text-align: center; padding: 28px 24px; gap: 20px; }
    .profile-tags { justify-content: center; }
    .greeting-wrap { padding: 28px 22px; }
    .closing-card { padding: 28px 22px; }
    .closing-text { font-size: 14px; }
  }
</style>

<style>
.site-header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border,#ede8e3);box-shadow:0 1px 8px rgba(0,0,0,.05);}
.header-inner{max-width:860px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:16px;}
.site-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-mark{width:36px;height:36px;background:var(--sakura-deep,#c0514d);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;}
.logo-name{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--text,#2a2220);line-height:1.2;}
.logo-sub{font-size:9px;color:#8a7a72;line-height:1.3;letter-spacing:.01em;}
.header-nav{display:flex;align-items:center;gap:2px;margin-left:auto;}
.nav-link{font-size:12px;color:var(--text,#2a2220);text-decoration:none;padding:6px 9px;border-radius:8px;transition:all .18s;white-space:nowrap;font-weight:400;}
.nav-link:hover{background:var(--sakura-light,#fdf0ef);color:var(--sakura-deep,#c0514d);}
.nav-link.lang-switch{border:1px solid var(--border,#ede8e3);margin-left:4px;font-size:11px;}
.header-actions{display:none;align-items:center;gap:10px;flex-shrink:0;}
.header-tel{font-size:13px;font-weight:600;color:var(--sakura-deep,#c0514d);text-decoration:none;font-family:'Noto Serif JP',serif;}
.btn-lang{font-size:11px;color:var(--text,#2a2220);text-decoration:none;border:1px solid var(--border,#ede8e3);padding:4px 8px;border-radius:8px;white-space:nowrap;}
.hamburger{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--text,#2a2220);border-radius:2px;transition:all .25s;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.mobile-nav{display:none;flex-direction:column;background:white;border-top:1px solid var(--border,#ede8e3);padding:8px 0 16px;}
.mobile-nav.open{display:flex;}
.mobile-nav-link{font-size:14px;color:var(--text,#2a2220);text-decoration:none;padding:12px 24px;transition:background .15s;}
.mobile-nav-link:hover{background:var(--cream,#faf7f4);}
.mobile-nav-divider{height:1px;background:var(--border,#ede8e3);margin:8px 24px;}
.lang-link{color:#8a7a72;font-size:13px;}
@media(max-width:700px){.header-nav{display:none;}.header-actions{display:flex;}}
@media(min-width:701px){.mobile-nav{display:none!important;}}
