<style>
.site-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border, #ede8e3);
  box-shadow: 0 1px 8px rgba(0,0,0,0.05);
}
.header-inner {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.site-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-mark {
  width: 36px;
  height: 36px;
  background: var(--sakura-deep, #c0514d);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  font-weight: 600;
}
.logo-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text, #2a2220);
  line-height: 1.2;
}
.logo-sub {
  font-size: 9px;
  color: #8a7a72;
  line-height: 1.3;
  letter-spacing: 0.01em;
}
.header-nav {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-left: auto;
}
.nav-link {
  font-size: 12px;
  color: var(--text, #2a2220);
  text-decoration: none;
  padding: 6px 9px;
  border-radius: 8px;
  transition: all 0.18s;
  white-space: nowrap;
  font-weight: 400;
}
.nav-link:hover {
  background: var(--sakura-light, #fdf0ef);
  color: var(--sakura-deep, #c0514d);
}
.nav-link.lang-switch {
  border: 1px solid var(--border, #ede8e3);
  margin-left: 4px;
  font-size: 11px;
}
.header-actions {
  display: none;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.header-tel {
  font-size: 13px;
  font-weight: 600;
  color: var(--sakura-deep, #c0514d);
  text-decoration: none;
  font-family: 'Noto Serif JP', serif;
}
.btn-lang {
  font-size: 11px;
  color: var(--text, #2a2220);
  text-decoration: none;
  border: 1px solid var(--border, #ede8e3);
  padding: 4px 8px;
  border-radius: 8px;
  white-space: nowrap;
}
.hamburger {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--text, #2a2220);
  border-radius: 2px;
  transition: all 0.25s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
.mobile-nav {
  display: none;
  flex-direction: column;
  background: white;
  border-top: 1px solid var(--border, #ede8e3);
  padding: 8px 0 16px;
}
.mobile-nav.open { display: flex; }
.mobile-nav-link {
  font-size: 14px;
  color: var(--text, #2a2220);
  text-decoration: none;
  padding: 12px 24px;
  transition: background 0.15s;
}
.mobile-nav-link:hover { background: var(--cream, #faf7f4); }
.mobile-nav-divider {
  height: 1px;
  background: var(--border, #ede8e3);
  margin: 8px 24px;
}
.lang-link { color: #8a7a72; font-size: 13px; }

@media (max-width: 700px) {
  .header-nav { display: none; }
  .header-actions { display: flex; }
}
@media (min-width: 701px) {
  .mobile-nav { display: none !important; }
}
</style>

<script>
(function() {
  const hamburger = document.getElementById('hamburger');
  const mobileNav = document.getElementById('mobileNav');
  if (!hamburger || !mobileNav) return;
  hamburger.addEventListener('click', function() {
    const isOpen = mobileNav.classList.toggle('open');
    hamburger.classList.toggle('open', isOpen);
    hamburger.setAttribute('aria-expanded', isOpen);
    mobileNav.setAttribute('aria-hidden', !isOpen);
  });
  // Close on outside click
  document.addEventListener('click', function(e) {
    if (!document.getElementById('siteHeader').contains(e.target)) {
      mobileNav.classList.remove('open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', false);
      mobileNav.setAttribute('aria-hidden', true);
    }
  });
  // Highlight active nav link
  const currentPage = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-link, .mobile-nav-link').forEach(function(a) {
    if (a.getAttribute('href') && a.getAttribute('href').includes(currentPage)) {
      a.style.color = 'var(--sakura-deep, #c0514d)';
      a.style.fontWeight = '500';
    }
  });
})();
</script>
