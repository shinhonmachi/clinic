                            .container { max-width: 720px; margin: 0 auto; padding: 48px 32px; }
  .dept-section { margin-bottom: 40px; }
  .dept-header { display: flex; align-items: center; gap: 14px; background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; border-left: 4px solid var(--sakura-deep); }
  .dept-icon-lg { font-size: 28px; }
  .dept-title { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 600; }
  .dept-title-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .dept-body { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .dept-body p { font-size: 13px; color: var(--text); line-height: 1.9; margin-bottom: 12px; }
  .dept-body p:last-child { margin-bottom: 0; }
  .symptom-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .symptom-tag { background: var(--sakura-light); color: var(--sakura-deep); font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--sakura); }
  .clinic-photo { border-radius: 16px; overflow: hidden; margin-bottom: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .clinic-photo img { width: 100%; height: 280px; object-fit: cover; display: block; }
  .clinic-photo-caption { background: white; border: 1px solid var(--border); border-top: none; border-radius: 0 0 16px 16px; padding: 12px 20px; font-size: 12px;  text-align: center; }
  .info-box { background: var(--green-light); border: 1px solid #c5dece; border-radius: 12px; padding: 20px 24px; margin-top: 32px; }
  .info-box-title { font-size: 14px; font-weight: 500; color: var(--green); margin-bottom: 8px; }
  .info-box p { font-size: 13px;  }

  /* Self-Pay Service Cards */
  .jhi-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 40px 0 8px;
  }
  .jhi-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px 22px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    transition: all 0.25s;
  }
  .jhi-card:hover {
    border-color: var(--sakura);
    box-shadow: 0 6px 24px rgba(232,145,142,0.14);
    transform: translateY(-3px);
  }
  .jhi-card-icon { font-size: 32px; margin-bottom: 14px; }
  .jhi-card-label { font-size: 10px; color: var(--sakura-deep); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .jhi-card-title { font-family: 'Noto Serif JP', serif; font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 12px; line-height: 1.5; }
  .jhi-card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.85; flex: 1; margin-bottom: 16px; }
  .jhi-card-more { font-size: 12px; color: var(--sakura-deep); border-top: 1px dashed var(--border); padding-top: 12px; }

  @media (max-width: 540px) {
    .jhi-cards { grid-template-columns: 1fr; }

.site-header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border,#ede8e3);box-shadow:0 1px 8px rgba(0,0,0,.05);}
.header-inner{max-width:860px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:16px;}
.site-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-mark{width:36px;height:36px;background:var(--sakura-deep,#c0514d);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;}

.logo-sub{font-size:9px;color:#8a7a72;line-height:1.3;letter-spacing:.01em;}
.header-nav{display:flex;align-items:center;gap:2px;margin-left:auto;}
.nav-link{font-size:12px;color:var(--text,#2a2220);text-decoration:none;padding:6px 9px;border-radius:8px;transition:all .18s;white-space:nowrap;font-weight:400;}
.nav-link:hover{background:var(--sakura-light,#fdf0ef);color:var(--sakura-deep,#c0514d);}
.nav-link.lang-switch{border:1px solid var(--border,#ede8e3);margin-left:4px;font-size:11px;}
.header-actions{display:none;align-items:center;gap:10px;flex-shrink:0;}
.header-tel{font-size:13px;font-weight:600;color:var(--sakura-deep,#c0514d);text-decoration:none;font-family:'Noto Serif JP',serif;}
.btn-lang{font-size:11px;color:var(--text,#2a2220);text-decoration:none;border:1px solid var(--border,#ede8e3);padding:4px 8px;border-radius:8px;white-space:nowrap;}
.hamburger{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--text,#2a2220);border-radius:2px;transition:all .25s;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.mobile-nav{display:none;flex-direction:column;background:white;border-top:1px solid var(--border,#ede8e3);padding:8px 0 16px;}
.mobile-nav.open{display:flex;}
.mobile-nav-link{font-size:14px;color:var(--text,#2a2220);text-decoration:none;padding:12px 24px;transition:background .15s;}

.mobile-nav-divider{height:1px;background:var(--border,#ede8e3);margin:8px 24px;}
.lang-link{color:#8a7a72;font-size:13px;}
