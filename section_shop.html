<style>
  .container { max-width: 800px; margin: 0 auto; padding: 48px 32px; }

  /* セクション見出し */
  .section-heading {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px; font-weight: 600;
    margin: 48px 0 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .section-heading:first-of-type { margin-top: 0; }
  .section-heading::before {
    content: ''; display: inline-block;
    width: 4px; height: 20px;
    background: var(--sakura-deep); border-radius: 2px; flex-shrink: 0;
  }

  /* 商品グリッド */
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
    margin-bottom: 8px;
  }

  /* 商品カード */
  .shop-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    transition: all 0.25s;
    display: flex; flex-direction: column;
  }
  .shop-card:hover {
    box-shadow: 0 6px 24px rgba(232,145,142,0.13);
    transform: translateY(-3px);
  }

  /* 写真 */
  .card-img {
    width: 100%; aspect-ratio: 4/3;
    object-fit: cover; display: block;
    background: var(--sakura-light);
    transition: transform 0.4s ease;
  }
  .shop-card:hover .card-img { transform: scale(1.04); }

  /* 写真なしプレースホルダー */
  .card-img-placeholder {
    width: 100%; aspect-ratio: 4/3;
    background: var(--sakura-light);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: var(--sakura-deep); opacity: 0.45;
  }
  .card-img-placeholder svg { width: 32px; height: 32px; }
  .card-img-placeholder span { font-size: 11px; }

  /* テキストエリア */
  .card-body { padding: 16px 18px 20px; flex: 1; display: flex; flex-direction: column; }
  .card-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.7; flex: 1; margin-bottom: 14px; }
  .card-price {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px; font-weight: 600; color: var(--sakura-deep);
  }
  .card-price.inquiry { font-size: 13px; font-weight: 500; font-family: 'Noto Sans JP', sans-serif; }

  /* 注意書き */
  .info-box {
    background: var(--green-light); border: 1px solid #c5dece;
    border-radius: 12px; padding: 18px 22px; margin-top: 48px;
  }
  .info-box-title { font-size: 14px; font-weight: 500; color: var(--green); margin-bottom: 8px; }
  .info-box ul { padding-left: 16px; }
  .info-box li { font-size: 13px; color: var(--text-muted); line-height: 1.9; }

  @media (max-width: 540px) {
    .container { padding: 32px 16px; }
    .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-body { padding: 12px 14px 16px; }
  }
</style>
</head>
<body>

<div id="header-placeholder"></div>


<div class="page-hero">
  <span class="page-label">Shop &amp; Menu</span>
  <div class="page-title">院内販売</div>
  <div class="page-sub">美容・予防・体質改善のメニューをご用意しています</div>
</div>

<div class="container">

  <!--
    =====================================================
    商品の追加・変更方法

    【写真あり】
    <div class="shop-card">
      <img class="card-img" src="pics/ファイル名.webp" alt="商品名" loading="lazy">
      <div class="card-body">
        <div class="card-name">商品名</div>
        <div class="card-desc">説明文</div>
        <div class="card-price">0,000円</div>
      </div>
    </div>

    【写真なし】→ card-img-placeholder のブロックをそのまま使う

    【要問い合わせ価格】→ class="card-price inquiry" にする
    =====================================================
  -->

  <!-- 注射 -->
  <div class="section-heading">サプリ</div>
  <div class="shop-grid">

    <div class="shop-card">
      <img class="card-img" src="pics/shop_collagen.webp" alt="商品名" loading="lazy">

        <div class="card-price"></div>

    </div>

    <div class="shop-card">
     <img class="card-img" src="pics/shop_ginseng.webp" alt="商品名" loading="lazy">
      <div class="card-body">
        <div class="card-name">高麗人参サポニンカプセル</div>
        <div class="card-desc">1袋90カプセル入り</div>
        <div class="card-price"></div>
      </div>
    </div>

    <div class="shop-card">
     <img class="card-img" src="pics/shop_CplusD.webp" alt="商品名" loading="lazy">
      <div class="card-body">
        <div class="card-name">リポ-カプセル　ビタミンC+D</div>
        <div class="card-desc">1箱30包入り</div>
        <div class="card-price"></div>
      </div>
    </div> 

        <div class="shop-card">
     <img class="card-img" src="pics/shop_uv.webp" alt="商品名" loading="lazy">
      <div class="card-body">
        <div class="card-name">uv</div>
        <div class="card-desc">50mg</div>
        <div class="card-price"></div>
      </div>
    </div> 
  </div>

</div>

</body>
