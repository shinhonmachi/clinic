<style>
    
              
        
  /* メインビジュアル */
  .hero-photo {
    width: 100%;
    height: 420px;
    object-fit: cover;
    object-position: center;
    display: block;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .hero-photo:hover { opacity: 0.95; }

  .container { max-width: 800px; margin: 0 auto; padding: 48px 32px; }

  /* セクションタイトル */
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 20px;
    background: var(--sakura-deep);
    border-radius: 2px;
  }

  /* フォトグリッド */
  .photo-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 48px;
  }
  .photo-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 48px;
  }
  .photo-item {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    background: var(--border);
    cursor: pointer;
  }
  .photo-item img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .photo-grid-2 .photo-item img { height: 340px; }
  .photo-item:hover img { transform: scale(1.04); }
  .photo-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(58,53,48,0.7) 0%, transparent 100%);
    color: white;
    font-size: 12px;
    padding: 28px 14px 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .photo-item:hover .photo-caption { opacity: 1; }

  /* ライトボックス */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,25,22,0.92);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 24px;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .lightbox-caption { color: rgba(255,255,255,0.7); font-size: 13px; }
  .lightbox-close {
    position: absolute;
    top: 20px; right: 24px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 32px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.2s;
    padding: 12px;
  }
  .lightbox-nav:hover { opacity: 1; }
  .lightbox-prev { left: 12px; }
  .lightbox-next { right: 12px; }

    
  @media (max-width: 600px) {
    .photo-grid-3 { grid-template-columns: 1fr 1fr; }
    .hero-photo { height: 260px; }
  }
</style>
</head>
<body>

<div id="header-placeholder"></div>

<div class="page-hero">
  <span class="page-label">Facility</span>
  <div class="page-title">施設案内</div>
  <div class="page-sub">清潔で落ち着いた環境でお迎えします</div>
</div>

<!-- 外観メインビジュアル -->
<picture>
  <source srcset="pics/gaikan.webp" type="image/webp">
  <img src="pics/gaikan.JPG" class="hero-photo" alt="クリニック外観" onclick="openLightbox(0)" loading="eager" decoding="async" width="1440" height="1080">
</picture>

<div class="container">

  <!-- 受付 -->
  <div class="section-title">受付</div>
  <div class="photo-grid-2">
    <div class="photo-item" onclick="openLightbox(1)">
      <picture>
      <source srcset="pics/uketsuke.webp" type="image/webp">
      <img src="pics/uketsuke.JPG" alt="受付" loading="lazy" decoding="async" width="1200" height="1600">
    </picture>
      <div class="photo-caption">受付カウンター</div>
    </div>
    <div class="photo-item" onclick="openLightbox(2)">
      <picture>
      <source srcset="pics/uketsuke2.webp" type="image/webp">
      <img src="pics/uketsuke2.JPG" alt="受付2" loading="lazy" decoding="async" width="1200" height="1600">
    </picture>
      <div class="photo-caption">待合スペース</div>
    </div>
  </div>

  <!-- 診療室 -->
  <div class="section-title">診療室</div>
  <div class="photo-grid-3">
    <div class="photo-item" onclick="openLightbox(3)">
      <picture>
      <source srcset="pics/shinryodai1.webp" type="image/webp">
      <img src="pics/shinryodai1.JPG" alt="診療台1" loading="lazy" decoding="async" width="1000" height="1333">
    </picture>
      <div class="photo-caption">診療台</div>
    </div>
    <div class="photo-item" onclick="openLightbox(4)">
      <picture>
      <source srcset="pics/shinryodai2.webp" type="image/webp">
      <img src="pics/shinryodai2.JPG" alt="診療台2" loading="lazy" decoding="async" width="1000" height="1333">
    </picture>
      <div class="photo-caption">診療台</div>
    </div>
    <div class="photo-item" onclick="openLightbox(5)">
      <picture>
      <source srcset="pics/shinryodai4.webp" type="image/webp">
      <img src="pics/shinryodai4.JPG" alt="診療台4" loading="lazy" decoding="async" width="1000" height="1333">
    </picture>
      <div class="photo-caption">診療台</div>
    </div>
  </div>

  <!-- 医療機器 -->
  <div class="section-title">医療機器</div>
  <div class="photo-grid-2" style="grid-template-columns: 1fr 2fr;">
    <div class="photo-item" onclick="openLightbox(6)">
      <picture>
      <source srcset="pics/Ozon.webp" type="image/webp">
      <img src="pics/Ozon.JPG" alt="オゾン発生器" loading="lazy" decoding="async" width="800" height="1067" style="height:200px;">
    </picture>
      <div class="photo-caption">オゾン発生器</div>
    </div>
  </div>

</div>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightboxBtn()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">‹</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-caption" id="lightbox-caption"></div>
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">›</button>
</div>

<div id="footer-placeholder"></div>

<script>
  const photos = [
    { src: 'pics/gaikan.webp', caption: 'クリニック外観' },
    { src: 'pics/uketsuke.webp', caption: '受付カウンター' },
    { src: 'pics/uketsuke2.webp', caption: '待合スペース' },
    { src: 'pics/shinryodai1.webp', caption: '診療台' },
    { src: 'pics/shinryodai2.webp', caption: '診療台' },
    { src: 'pics/shinryodai4.webp', caption: '診療台' },
    { src: 'pics/Ozon.webp', caption: 'オゾン発生器' },
  ];
  let current = 0;

  function openLightbox(index) {
    current = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightboxBtn() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeLightbox(e) {
    if (e.target === document.getElementById('lightbox')) closeLightboxBtn();
  }
  function navLightbox(dir) {
    current = (current + dir + photos.length) % photos.length;
    updateLightbox();
  }
  function updateLightbox() {
    document.getElementById('lightbox-img').src = photos[current].src;
    document.getElementById('lightbox-caption').textContent = photos[current].caption;
  }
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
    if (e.key === 'Escape') closeLightboxBtn();
  });
</script>

<script src="common.js"></script>
</body>
</html>
